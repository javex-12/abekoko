<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Salem African Church of Christ</title>
    <link rel="icon" type="image/jpeg" href="images/gallery/logo.jpg">
    <link rel="stylesheet" href="styles/main.css">
    <style>
        .error-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            background: linear-gradient(135deg, var(--light-color), var(--white));
        }
        .error-content {
            max-width: 600px;
        }
        .error-code {
            font-size: 8rem;
            font-weight: bold;
            color: var(--primary-color);
            margin: 0;
            line-height: 1;
        }
        .error-message {
            font-size: 1.5rem;
            margin: 1rem 0 2rem;
            color: var(--dark-color);
        }
        .error-description {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            color: var(--text-color);
        }
        .home-button {
            display: inline-block;
            background: var(--primary-color);
            color: var(--white);
            padding: 1rem 2rem;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: var(--transition);
        }
        .home-button:hover {
            background: var(--secondary-color);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-content">
            <h1 class="error-code">404</h1>
            <h2 class="error-message">Page Not Found</h2>
            <p class="error-description">
                The page you're looking for doesn't exist. It might have been moved, deleted, or you entered the wrong URL.
            </p>
            <a href="index.html" class="home-button">
                <i class="fas fa-home"></i>
                Return to Home
            </a>
            <div style="margin-top: 2rem;">
                <p><strong>Need help?</strong></p>
                <p>Contact us at <a href="tel:+2349062759260">0906275926</a> or visit our <a href="contact.html">contact page</a></p>
            </div>
        </div>
    </div>
    
    <script>
        // Auto-redirect after 10 seconds
        setTimeout(() => {
            window.location.href = 'index.html';
        }, 10000);
    </script>
</body>
</html>
